<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VITANY® · İçerik Planı</title>
<meta property="og:title" content="VITANY® — İçerik Planı Önizleme">
<meta property="og:description" content="Sculpt koleksiyonu · Temmuz içerik planı feed önizlemesi">
<meta name="theme-color" content="#1A1512">
<link rel="icon" href="logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1512; --bone: #F3EEE6; --sand: #CBB79D; --blush: #E7C6BF;
    --wine: #6E2233; --berry: #9A3B4E; --line: #efefef; --muted: #8a8178;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Jost', system-ui, -apple-system, sans-serif; color: var(--ink);
    background: radial-gradient(120% 90% at 15% 0%, #efe7db 0%, #e4d9c9 45%, #d6c9b7 100%);
    display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 20px;
  }
  @media (prefers-reduced-motion: reduce) { * { animation: none!important; transition: none!important; } }

  .phone {
    width: 414px; max-width: 100%; background: #fff; border-radius: 42px; overflow: hidden; position: relative;
    box-shadow: 0 40px 90px -34px rgba(26,21,18,.5); border: 1px solid rgba(255,255,255,.6);
  }
  .screen { height: 844px; max-height: 88dvh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: #fff; }
  .screen::-webkit-scrollbar { width: 0; }
  @media(max-width:480px){
    body { padding: 0; background: #fff; }
    .phone { width: 100%; border-radius: 0; border: none; box-shadow: none; }
    .screen { height: 100dvh; max-height: none; }
  }

  .topbar { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,.94); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; border-bottom: 1px solid #f1f1f1; }
  .brand { display: flex; align-items: center; gap: 6px; }
  .brand .name { font-family: 'Cormorant', serif; font-size: 23px; font-weight: 600; letter-spacing: .04em; }
  .brand .verif { width: 15px; height: 15px; fill: #3897f0; }
  .topicons { display: flex; gap: 20px; }
  .topicons svg { width: 23px; height: 23px; stroke: var(--ink); fill: none; stroke-width: 1.7; }

  .phead { padding: 18px 18px 6px; }
  
  .prow { display: flex; align-items: center; gap: 22px; flex-wrap: nowrap; }
  
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    flex: 0 0 84px;
    background: #eee;
    padding: 3px;
    box-shadow: 0 0 0 2px #f0e9df;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
    /* Resim yüklenemediğinde alt metninin tasarımı bozmasını engeller: */
    font-size: 10px;
    line-height: 84px;
    text-align: center;
    color: var(--muted);
    overflow: hidden;
    white-space: nowrap;
  }

  .stats { flex: 1; display: flex; justify-content: space-around; text-align: center; min-width: 0; }
  .stats b { display: block; font-size: 17px; font-weight: 600; }
  .stats span { font-size: 12.5px; color: #3a3630; }
  .bio { padding: 12px 0 0; }
  .bio .dn { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .bio .dn svg { width: 14px; height: 14px; fill: #3897f0; }
  .bio .cat { font-size: 12.5px; color: var(--muted); }
  .bio .txt { font-size: 13px; line-height: 1.55; margin-top: 5px; font-weight: 300; color: #3d3831; }
  .bio .txt .lead { font-family: 'Cormorant', serif; font-style: italic; font-size: 15px; color: var(--wine); }
  .bio .link { font-size: 13px; color: #3a5a8a; font-weight: 500; margin-top: 3px; text-decoration: none; display: inline-block; }
  .pbtns { display: flex; gap: 7px; margin-top: 14px; }
  .pbtns button { flex: 1; border: none; background: #efefef; border-radius: 9px; padding: 8px; font-family: 'Jost'; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; }
  .pbtns button.primary { background: var(--ink); color: #fff; }
  .pbtns button.icon { flex: 0 0 40px; }

  .highs { display: flex; gap: 18px; padding: 18px 18px 8px; overflow-x: auto; }
  .highs::-webkit-scrollbar { display: none; }
  .high { flex: 0 0 auto; text-align: center; width: 66px; }
  .high .ring { width: 62px; height: 62px; border-radius: 50%; padding: 2px; background: conic-gradient(from 210deg,var(--sand),var(--blush),var(--wine),var(--sand)); margin: 0 auto; }
  .high .ring i { display: grid; place-items: center; width: 100%; height: 100%; border-radius: 50%; background: #fff; border: 2px solid #fff; }
  .high .ring i b { width: 52px; height: 52px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-family: 'Cormorant', serif; font-size: 12px; font-weight: 600; letter-spacing: .03em; text-align: center; line-height: 1.05; }
  .high p { font-size: 11px; margin-top: 6px; color: #4a453f; font-weight: 400; }

  .tabs { position: sticky; top: 52px; z-index: 15; display: flex; border-top: 1px solid #efefef; border-bottom: 1px solid #efefef; background: #fff; }
  .tabs button { flex: 1; background: none; border: none; padding: 11px 0; display: grid; place-items: center; cursor: pointer; border-top: 2px solid transparent; margin-top: -1px; }
  .tabs button.on { border-top-color: var(--ink); }
  .tabs svg { width: 22px; height: 22px; stroke: #9a938a; fill: none; stroke-width: 1.8; }
  .tabs button.on svg { stroke: var(--ink); }

  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; background: #fff; padding-bottom: 12px; }
  .cell { position: relative; aspect-ratio: 1/1; overflow: hidden; background: #eee; cursor: pointer; }
  .cell img, .cell video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell .ph { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 11px; color: #fff; }
  .cell .ph .no { font-family: 'Cormorant', serif; font-size: 34px; font-weight: 600; line-height: 1; opacity: .85; }
  .cell .ph .lb { font-size: 9.5px; letter-spacing: .13em; text-transform: uppercase; font-weight: 500; opacity: .92; }
  .cell .badge { position: absolute; top: 7px; right: 7px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  .cell .badge svg { width: 19px; height: 19px; fill: none; stroke: #fff; stroke-width: 1.8; }
  .cell .rlabel { position: absolute; bottom: 7px; left: 8px; color: #fff; font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 4px; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
  .cell .rlabel svg { width: 13px; height: 13px; fill: #fff; }
  .cell .flag { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 8px 7px; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: #fff; font-weight: 500; background: linear-gradient(transparent,rgba(0,0,0,.55)); opacity: 0; transition: opacity .2s; }
  .cell:hover .flag { opacity: 1; }

  .overlay { position: absolute; inset: 0; z-index: 60; background: #fff; transform: translateY(100%); transition: transform .34s cubic-bezier(.4,0,.1,1); display: flex; flex-direction: column; }
  .overlay.open { transform: translateY(0); }
  .ovhead { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #f1f1f1; position: sticky; top: 0; background: #fff; z-index: 3; }
  .ovhead .back { background: none; border: none; cursor: pointer; padding: 2px; }
  .ovhead .back svg { width: 24px; height: 24px; stroke: var(--ink); fill: none; stroke-width: 2; }
  .ovhead .miniav { width: 34px; height: 34px; border-radius: 50%; overflow: hidden; flex: 0 0 34px; }
  .ovhead .miniav img { width: 100%; height: 100%; object-fit: cover; }
  .ovhead .who b { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; line-height: 1.1; }
  .ovhead .who b svg { width: 12px; height: 12px; fill: #3897f0; }
  .ovhead .who span { font-size: 11px; color: var(--muted); }
  .ovhead .more { margin-left: auto; font-size: 20px; letter-spacing: 2px; color: var(--ink); padding: 0 4px; }
  .ovbody { flex: 1; overflow-y: auto; }
  .ovbody::-webkit-scrollbar { width: 0; }

  .media { position: relative; width: 100%; aspect-ratio: 4/5; background: #111; overflow: hidden; }
  .media.reels { aspect-ratio: 9/16; max-height: 600px; }
  .track { display: flex; height: 100%; transition: transform .3s ease; touch-action: pan-y; }
  .slide { flex: 0 0 100%; height: 100%; }
  .slide img, .slide video, .media>video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .media .fullph { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 26px; color: #fff; }
  .media .fullph .big { font-family: 'Cormorant', serif; font-size: 64px; font-weight: 600; line-height: .9; }
  .media .fullph .small { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; font-weight: 500; }
  .media .fullph .desc { font-size: 12px; line-height: 1.5; font-weight: 300; max-width: 80%; opacity: .9; }
  .dots { position: absolute; bottom: 12px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; }
  .dots i { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5); }
  .dots i.on { background: #fff; }
  .count { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.6); color: #fff; font-size: 12px; font-weight: 500; border-radius: 100px; padding: 3px 10px; }
  .nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.85); border: none; width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; cursor: pointer; opacity: 0; transition: opacity .2s; z-index: 2; }
  .media:hover .nav { opacity: 1; }
  .nav.prev { left: 8px; } .nav.next { right: 8px; }
  .nav svg { width: 15px; height: 15px; stroke: var(--ink); fill: none; stroke-width: 2.4; }
  .mute { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,.55); border: none; width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; cursor: pointer; z-index: 2; }
  .mute svg { width: 16px; height: 16px; stroke: #fff; fill: #fff; }

  .acts { display: flex; align-items: center; gap: 16px; padding: 11px 14px 6px; }
  .acts svg { width: 25px; height: 25px; stroke: var(--ink); fill: none; stroke-width: 1.7; cursor: pointer; }
  .acts .save { margin-left: auto; }
  .acts .heart.liked { fill: #ed4956; stroke: #ed4956; }
  .likes { padding: 0 14px; font-size: 13.5px; font-weight: 600; }
  .caption { padding: 6px 14px 4px; font-size: 13.5px; line-height: 1.5; }
  .caption .body { font-weight: 300; white-space: pre-line; }
  .caption b { font-weight: 600; margin-right: 6px; }
  .caption .tag { color: #385185; }
  .cmeta { padding: 5px 14px 18px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .planbar { display: flex; gap: 8px; align-items: center; padding: 9px 14px; background: #faf7f2; border-top: 1px solid #f0eae0; font-size: 11px; color: #7a736b; }
  .planbar .pill { background: #fff; border: 1px solid var(--line); border-radius: 100px; padding: 3px 10px; font-weight: 500; color: var(--wine); }

  .loading { position: absolute; inset: 0; display: grid; place-items: center; background: #fff; z-index: 80; }
  .loading .v { font-family: 'Cormorant', serif; font-size: 56px; font-weight: 600; color: var(--wine); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="phone">
  <div class="screen" id="screen">
    <div class="loading" id="loading"><div class="v">V</div></div>

    <div class="topbar">
      <div class="brand"><span class="name" id="tbname">vitany</span>
        <svg class="verif" id="tbverif" viewBox="0 0 24 24"><path d="M12 2l2.4 1.8 3 .2.9 2.9 2.4 1.8-1 2.9 1 2.9-2.4 1.8-.9 2.9-3 .2L12 22l-2.4-1.8-3-.2-.9-2.9L3.3 15.3l1-2.9-1-2.9 2.4-1.8.9-2.9 3-.2z"/><path d="M8.5 12l2.3 2.3 4.7-4.7" fill="none" stroke="#fff" stroke-width="2"/></svg>
      </div>
      <div class="topicons">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </div>
    </div>

    <div class="phead">
      <div class="prow">
        <div class="avatar"><img id="pavatar" src="logo.jpg" alt="VITANY"></div>
        <div class="stats" id="pstats"></div>
      </div>
      <div class="bio">
        <div class="dn" id="pname"></div>
        <div class="cat" id="pcat"></div>
        <div class="txt" id="pbio"></div>
        <a class="link" id="plink" target="_blank" rel="noopener"></a>
      </div>
      <div class="pbtns">
        <button class="primary">Takip et</button>
        <button>Mesaj</button>
        <button class="icon">▾</button>
      </div>
    </div>

    <div class="highs" id="highs"></div>

    <div class="tabs">
      <button class="on"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
      <button><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 3l3 6M15 3l3 6M3 9h18M10 13l5 3-5 3z"/></svg></button>
      <button><svg viewBox="0 0 24 24"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z"/></svg></button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="overlay" id="overlay">
      <div class="ovhead">
        <button class="back" id="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></button>
        <div class="miniav"><img id="ovav" src="logo.jpg" alt=""></div>
        <div class="who"><b id="ovname">vitany <svg viewBox="0 0 24 24"><path d="M12 2l2.4 1.8 3 .2.9 2.9 2.4 1.8-1 2.9 1 2.9-2.4 1.8-.9 2.9-3 .2L12 22l-2.4-1.8-3-.2-.9-2.9L3.3 15.3l1-2.9-1-2.9 2.4-1.8.9-2.9 3-.2z"/></svg></b><span id="ovsub"></span></div>
        <div class="more">···</div>
      </div>
      <div class="ovbody">
        <div class="media" id="media"></div>
        <div class="acts">
          <svg class="heart" id="heart" viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-8.5C1 9 3 6 6 6c2 0 3 1.2 3.8 2.3C10.6 7.2 11.7 6 14 6c3 0 5 3 3.5 6.5C19 16.5 12 21 12 21z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6.1A8.4 8.4 0 1 1 21 11.5z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
          <svg class="save" viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg>
        </div>
        <div class="likes" id="likes"></div>
        <div class="caption"><span class="body"><b id="capname">vitany</b><span id="captiontext"></span></span></div>
        <div class="cmeta" id="cmeta">2 SAAT ÖNCE</div>
        <div class="planbar"><span class="pill" id="plansection"></span><span id="plantitle"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
const IMG_RE=/\.(jpe?g|png|webp|gif|avif|bmp)$/i, VID_RE=/\.(mp4|mov|webm|m4v)$/i;
let FEED=null;

const FALLBACK={profile:{username:"vitany.official",name:"VITANY®",category:"Spor giyim markası",avatar:"logo.jpg",verified:true,bio:["Vitaniate your potential.","Sculpt koleksiyonu · terletmez form"],link:"vitany.com",linkUrl:"https://vitany.com",stats:{posts:"9",followers:"30 B",following:"2"},highlights:[{label:"Kampanya",sub:"Lansman",grad:["#7a2a3a","#4a1622"]},{label:"Sadakat",sub:"PR",grad:["#c9a98d","#a07b55"]},{label:"Güven",sub:"Kalite",grad:["#3a332e","#161311"]},{label:"Sculpt",sub:"Koleksiyon",grad:["#9a3b4e","#5e1f2b"]}]},posts:[]};

async function boot(){
  try{
    const r=await fetch('feed.json',{cache:'no-store'});
    if(!r.ok) throw 0;
    FEED=await r.json();
  }catch(e){ FEED=FALLBACK; }
  if(!FEED.posts||!FEED.posts.length){
    FEED.posts=FALLBACK.posts;
  }
  renderProfile(); renderGrid();
  document.getElementById('loading').style.display='none';
}

function renderProfile(){
  const p=FEED.profile;
  document.getElementById('tbname').textContent=p.username.replace('.official','');
  document.getElementById('tbverif').style.display=p.verified?'':'none';
  document.getElementById('pavatar').src=p.avatar||'logo.jpg';
  document.getElementById('ovav').src=p.avatar||'logo.jpg';
  document.getElementById('pstats').innerHTML=
    `<div><b>${p.stats.posts}</b><span>gönderi</span></div>
     <div><b>${p.stats.followers}</b><span>takipçi</span></div>
     <div><b>${p.stats.following}</b><span>takip</span></div>`;
  const nm=document.getElementById('pname');
  nm.innerHTML=p.name+(p.verified?' <svg viewBox="0 0 24 24"><path d="M12 2l2.4 1.8 3 .2.9 2.9 2.4 1.8-1 2.9 1 2.9-2.4 1.8-.9 2.9-3 .2L12 22l-2.4-1.8-3-.2-.9-2.9L3.3 15.3l1-2.9-1-2.9 2.4-1.8.9-2.9 3-.2z"/></svg>':'');
  document.getElementById('pcat').textContent=p.category||'';
  const bio=(p.bio||[]).map((l,i)=>i===0?`<span class="lead">${l}</span>`:l).join('<br>');
  document.getElementById('pbio').innerHTML=bio;
  const lk=document.getElementById('plink'); lk.textContent=p.link||''; lk.href=p.linkUrl||'#';
  const capname=document.getElementById('capname'); capname.textContent=p.username.replace('.official','');
  document.getElementById('ovname').firstChild.textContent=p.username.replace('.official','')+' ';
  const hs=document.getElementById('highs');
  hs.innerHTML=(p.highlights||[]).map(h=>
    `<div class="high"><div class="ring"><i><b style="background:radial-gradient(circle at 35% 30%,${h.grad[0]},${h.grad[1]})">${h.label.replace(/(.{4})/,'$1<br>')}</b></i></div><p>${h.sub}</p></div>`).join('');
}

function typeOf(p){
  if(p.resolvedType) return p.resolvedType;
  if(/REELS/.test(p.hint||'')) return 'reels';
  if(/CAROUSEL|KOLAJ/.test(p.hint||'')) return 'carousel';
  return 'post';
}
function badge(type){
  if(type==='reels') return `<div class="rlabel"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Reels</div>`;
  if(type==='carousel') return `<div class="badge"><svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2.5"/><path d="M4 16V6a2 2 0 0 1 2-2h10"/></svg></div>`;
  return '';
}
const grid=document.getElementById('grid');
function renderGrid(){
  grid.innerHTML='';
  FEED.posts.forEach(p=>{
    const type=typeOf(p);
    const has=p.media&&p.media.length;
    const cell=document.createElement('div');
    cell.className='cell';
    let inner;
    if(has){
      inner = type==='reels'
        ? `<video src="${p.media[0]}" muted loop playsinline autoplay preload="metadata"></video>`
        : `<img src="${p.media[0]}" alt="" loading="lazy">`;
    }else{
      const pal=p.palette||['#221a17','#4a1622'];
      inner=`<div class="ph" style="background:linear-gradient(150deg,${pal[0]},${pal[1]})"><div class="no">0${p.n}</div><div class="lb">${p.title}</div></div>`;
    }
    cell.innerHTML=inner+badge(type)+`<div class="flag">${p.section} · ${p.theme}</div>`;
    cell.onclick=()=>openPost(p.n);
    grid.appendChild(cell);
  });
}

const overlay=document.getElementById('overlay'),media=document.getElementById('media');
let slideIndex=0,slideCount=1;
function openPost(n){
  const p=FEED.posts.find(x=>x.n===n),type=typeOf(p),has=p.media&&p.media.length;
  slideIndex=0; media.className='media'+(type==='reels'?' reels':''); media.innerHTML='';
  if(has&&type==='reels'){
    media.innerHTML=`<video id="rvid" src="${p.media[0]}" loop playsinline autoplay muted></video>
      <button class="mute" id="muteBtn"><svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M17 9l4 6M21 9l-4 6" stroke="#fff" stroke-width="2" fill="none"/></svg></button>`;
    const v=document.getElementById('rvid');
    document.getElementById('muteBtn').onclick=()=>{v.muted=!v.muted;};
    v.play().catch(()=>{});
  }else if(has&&type==='carousel'){
    slideCount=p.media.length;
    media.innerHTML=`<div class="track" id="track">${p.media.map(f=>`<div class="slide"><img src="${f}"></div>`).join('')}</div>
      <div class="count" id="count">1/${slideCount}</div>
      <button class="nav prev" id="prev"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></button>
      <button class="nav next" id="next"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
      <div class="dots" id="dots">${p.media.map((_,i)=>`<i class="${i?'':'on'}"></i>`).join('')}</div>`;
    wireCarousel();
  }else if(has){
    media.innerHTML=`<div class="slide" style="height:100%"><img src="${p.media[0]}"></div>`;
  }else{
    const pal=p.palette||['#221a17','#4a1622'];
    media.innerHTML=`<div class="fullph" style="background:linear-gradient(150deg,${pal[0]},${pal[1]})">
      <div class="small">${p.section} · ${p.theme}</div><div class="big">0${p.n}</div>
      <div><div class="small" style="margin-bottom:8px;opacity:.75">${p.hint}</div><div class="desc">${p.world||''}</div></div></div>`;
  }
  const ct=document.getElementById('captiontext'); ct.textContent=' '+p.caption;
  ct.innerHTML=ct.textContent.replace(/#([\wçğıöşüÇĞİÖŞÜ]+)/g,'<span class="tag">#$1</span>').replace(/@([\w]+)/g,'<span class="tag">@$1</span>');
  document.getElementById('likes').textContent=(p.likes||'0')+' beğenme';
  document.getElementById('plansection').textContent=p.section;
  document.getElementById('plantitle').textContent=p.title;
  document.getElementById('ovsub').textContent= has?(type==='reels'?'Orijinal ses · vitany':'Sponsorlu'):'Plan önizleme · '+p.hint;
  document.getElementById('heart').classList.remove('liked');
  overlay.classList.add('open');
}
function wireCarousel(){
  const track=document.getElementById('track'),dots=document.getElementById('dots').children,count=document.getElementById('count');
  const go=i=>{slideIndex=Math.max(0,Math.min(slideCount-1,i));track.style.transform=`translateX(${-slideIndex*100}%)`;[...dots].forEach((d,k)=>d.classList.toggle('on',k===slideIndex));count.textContent=`${slideIndex+1}/${slideCount}`;};
  document.getElementById('prev').onclick=()=>go(slideIndex-1);
  document.getElementById('next').onclick=()=>go(slideIndex+1);
  let sx=0;
  track.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
  track.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)go(slideIndex+(dx<0?1:-1));});
}
document.getElementById('back').onclick=()=>{overlay.classList.remove('open');media.innerHTML='';};
document.getElementById('heart').onclick=e=>e.currentTarget.classList.toggle('liked');

boot();
</script>
</body>
</html>
